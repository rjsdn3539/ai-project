name: Backend Deploy

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: aimentor-backend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x backend/gradlew

      - name: Build backend
        working-directory: backend
        run: ./gradlew clean build --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Deploy on EC2
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} <<EOF
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY
            docker network create aimentor-net || true
            docker pull $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            docker stop aimentor-backend || true
            docker rm aimentor-backend || true
            docker run -d \
              --name aimentor-backend \
              --restart unless-stopped \
              --network aimentor-net \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JWT_SECRET_KEY='${{ secrets.JWT_SECRET }}' \
              -e AI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
              -e AI_PROVIDER=python \
              -e SPEECH_PROVIDER=python \
              -e AI_SERVER_URL='http://aimentor-ai-server:8000' \
              $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          EOF
