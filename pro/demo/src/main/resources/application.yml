spring:
  application:
    name: ai-mentor-backend

  datasource:
    url: jdbc:mariadb://localhost:3306/ai_interview?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234          # TODO: 실제 비밀번호로 변경 또는 환경변수 사용
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update      # 개발: update / 운영: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

# JWT 설정
jwt:
  secret: ${JWT_SECRET:ai-mentor-secret-key-please-change-in-production-min-256bit}

# Python AI 서버 설정
ai:
  server:
    url: http://localhost:8000
  service:
    mock: true   # true=Mock 사용 (개발/테스트), false=Python 서버 실제 호출

# 로깅
logging:
  level:
    com.aimentor: DEBUG
    org.springframework.security: WARN

server:
  port: 8080
